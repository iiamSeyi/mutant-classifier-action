# action.yml
# ============
# This file is what makes this repo a GitHub Action.
# Any repo can reference it with: uses: your-org/mutant-classifier-action@v1
#
# GitHub reads this file to know:
#   - What inputs the action accepts (and their defaults)
#   - What outputs it produces (for downstream steps to read)
#   - How to run it (we use 'docker' - a container action)

name: 'Equivalent Mutant Classifier'
description: >
  Runs PIT mutation testing on a Java/Maven project and uses ML classification
  to filter out equivalent mutants, reporting an adjusted mutation score.

author: 'Towson University - Pugh et al.'

# Inputs are the knobs users can turn when they call this action.
# They appear as 'with:' keys in the caller's workflow YAML.
inputs:

  working-directory:
    description: 'Path to the Maven project root (where pom.xml lives)'
    required: false
    default: '.'

  confidence-threshold:
    description: >
      Minimum ML confidence score (0.0-1.0) to classify a mutant as equivalent
      and remove it from the adjusted score. Conservative default prevents
      false positives - we only discard mutants we are very sure about.
      The paper achieved ~94% F1, so 0.90 is a reasonable starting floor.
    required: false
    default: '0.90'

  fail-below-score:
    description: >
      Fail the workflow if the ADJUSTED mutation score (after equivalent mutants
      are removed) falls below this threshold. Set to 0 to never fail.
      Example: 0.70 means "at least 70% of real mutants must be killed."
    required: false
    default: '0.0'

  maven-args:
    description: >
      Extra arguments passed to the mvn pitest:mutationCoverage command.
      Useful for skipping certain modules or setting memory limits.
      Example: '-pl core-module -DjvmArgs=-Xmx2g'
    required: false
    default: ''

  upload-report:
    description: 'Whether to upload the HTML+JSON report as a workflow artifact'
    required: false
    default: 'true'

# Outputs let downstream steps in the caller's workflow read our results.
# Access with: ${{ steps.<step-id>.outputs.<output-name> }}
outputs:

  raw-mutation-score:
    description: 'PIT mutation score before equivalent mutant filtering (0.0-1.0)'

  adjusted-mutation-score:
    description: 'Mutation score after equivalent mutants are removed (0.0-1.0)'

  equivalent-mutants-found:
    description: 'Count of mutants classified as equivalent and removed'

  total-mutants:
    description: 'Total mutants generated by PIT'

  report-path:
    description: 'Path to the generated JSON report inside the container'

# How to run this action.
# 'docker' means GitHub builds our Dockerfile and runs the container.
# The entrypoint is defined in the Dockerfile (or overridden here).
runs:
  using: 'docker'
  image: 'Dockerfile'

  # Environment variables passed into the container at runtime.
  # GitHub Actions injects these automatically from the 'inputs' block above.
  env:
    WORKING_DIR: ${{ inputs.working-directory }}
    CONFIDENCE_THRESHOLD: ${{ inputs.confidence-threshold }}
    FAIL_BELOW_SCORE: ${{ inputs.fail-below-score }}
    MAVEN_ARGS: ${{ inputs.maven-args }}
    UPLOAD_REPORT: ${{ inputs.upload-report }}

# Branding for the GitHub Actions Marketplace (optional but nice)
branding:
  icon: 'shield'
  color: 'blue'