# .github/workflows/mutation-ci.yml
# ==================================
# This workflow lives IN the action repo and tests the action against the
# sample-java-project/ folder in the same repo.
#
# The key: `uses: ./` means "use the action.yml defined right here"
# instead of fetching it from a remote repo. This is the standard pattern
# for testing a GitHub Action during development.
#
# When you publish the action and someone else wants to use it, they would
# write `uses: your-org/mutant-classifier-action@v1` in their own repo.

name: Test Mutation Classifier Action

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths:
      - 'sample-java-project/src/**/*.java'
      - 'sample-java-project/pom.xml'
      - 'classify.py'
      - 'entrypoint.sh'
      - 'Dockerfile'
      - 'action.yml'
      - '.github/workflows/mutation-ci.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test-action:
    name: Run action against sample project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      # `uses: ./` means "run the action.yml in the root of this repo"
      # working-directory points into the sample project subfolder
      - name: Run mutation testing and classify equivalent mutants
        id: mutant-classifier
        uses: ./
        with:
          working-directory: 'sample-java-project'
          confidence-threshold: '0.90'
          fail-below-score: '0.0'

      - name: Upload PIT HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pit-html-report-${{ github.run_number }}
          path: sample-java-project/target/pit-reports/
          retention-days: 30

      - name: Upload classifier JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutant-classifier-report-${{ github.run_number }}
          path: sample-java-project/target/mutant-classifier-report/
          retention-days: 30

      # Echo the step outputs so we can see them in the CI log during development
      - name: Print classifier outputs
        if: always()
        run: |
          echo "Raw score:      ${{ steps.mutant-classifier.outputs.raw-mutation-score }}"
          echo "Adjusted score: ${{ steps.mutant-classifier.outputs.adjusted-mutation-score }}"
          echo "Equiv found:    ${{ steps.mutant-classifier.outputs.equivalent-mutants-found }}"
          echo "Total mutants:  ${{ steps.mutant-classifier.outputs.total-mutants }}"